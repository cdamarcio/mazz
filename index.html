    <style>
        /* Mantendo o seu estilo original de botões coloridos */
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center;

                font-size: 1.1em; transition: transform 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card:hover { transform: scale(1.05); }
        
        /* Cores originais do seu projeto */
        .azul { background-color: #007bff; }
        .verde { background-color: #28a745; }
        .laranja { background-color: #fd7e14; }
        .vermelho { background-color: #dc3545; }
        .roxo { background-color: #6f42c1; }
        .preto { background-color: #343a40; }
        .logo { margin-bottom: 30px; max-width: 200px; }
    </style>
</head>
